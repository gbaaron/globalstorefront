<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Global Storefront</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface-2: #232340;
            --gold: #d4af37;
            --gold-light: #e8c84a;
            --text: #f0f0f0;
            --text-muted: #8892a0;
            --radius: 14px;
            --radius-sm: 10px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 24px);
            overflow: hidden;
        }

        /* Atmospheric background */
        body::before {
            content: '';
            position: fixed;
            inset: -10%;
            background:
                radial-gradient(ellipse 600px 500px at 20% 20%, rgba(212, 175, 55, 0.08), transparent 55%),
                radial-gradient(ellipse 500px 400px at 80% 70%, rgba(212, 175, 55, 0.05), transparent 55%);
            z-index: 0;
            pointer-events: none;
            animation: ambientShift 18s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-2%, 2%) scale(1.03); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.15);
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-title {
            text-align: center;
        }

        .login-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-field {
            position: relative;
        }

        .form-field input {
            width: 100%;
            padding: 16px 18px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-field input::placeholder {
            color: var(--text-muted);
        }

        .form-field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: var(--radius-sm);
            color: #0f0f1a;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            width: 100%;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-size: 0.85rem;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .login-footer {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="logo.png" alt="Global Storefront">
        </div>

        <div class="login-title">
            <h1>Global Storefront</h1>
            <p>Sign in to manage your store</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-field">
                <input type="text" id="username" placeholder="Username or email" autocomplete="username" autocapitalize="none" required>
            </div>
            <div class="form-field">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
            </div>
            <div class="login-error" id="loginError"></div>
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
        </form>

        <div class="login-footer">
            Powered by Global Storefront
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const btnEl = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.remove('visible');
            btnEl.disabled = true;
            btnEl.textContent = 'Signing in...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Invalid credentials');
                }

                // Store auth data
                localStorage.setItem('gs_token', data.token);
                localStorage.setItem('gs_user', JSON.stringify({
                    name: data.name,
                    company: data.company,
                    projectUrl: data.projectUrl,
                    username: data.username
                }));

                // Redirect to app
                window.location.href = '/app.html';

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('visible');
                btnEl.disabled = false;
                btnEl.textContent = 'Sign In';
            }
        });

        // If already logged in, redirect
        if (localStorage.getItem('gs_token')) {
            window.location.href = '/app.html';
        }
    </script>
</body>
</html>
