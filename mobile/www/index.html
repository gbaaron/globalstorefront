<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Global Storefront</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .loading {
      text-align: center;
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: linear-gradient(135deg, #d4af37, #b8962e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #0f0f1a;
    }
    .loading-text {
      font-size: 16px;
      color: #8892a0;
      margin-bottom: 16px;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .offline-msg {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 14px;
      color: #8892a0;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-logo">G</div>
    <p class="loading-text">Loading Global Storefront...</p>
    <div class="loading-spinner"></div>
    <div class="offline-msg" id="offlineMsg">
      <p>Unable to connect. Please check your internet connection and try again.</p>
      <button onclick="location.reload()" style="margin-top:12px; padding:8px 20px; background:#d4af37; color:#0f0f1a; border:none; border-radius:6px; font-weight:600; cursor:pointer;">Retry</button>
    </div>
  </div>
  <script>
    // This fallback page shows when the remote URL is unreachable.
    // Normally Capacitor loads the remote URL directly (capacitor.config.ts server.url).
    // This only displays if the device is offline on cold start.
    setTimeout(() => {
      if (!navigator.onLine) {
        document.getElementById('offlineMsg').style.display = 'block';
        document.querySelector('.loading-spinner').style.display = 'none';
        document.querySelector('.loading-text').textContent = 'You appear to be offline';
      }
    }, 5000);

    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
